<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward-Night ✨ Attraction Cursor</title>
    <style>
        body, html, #app {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            touch-action: none;
            background: linear-gradient(135deg, #0a0f1e 0%, #1e1b4b 100%);
        }

        #app {
            height: 100%;
            font-family: "Montserrat", serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            overflow: hidden;
        }

        .buttons {
            position: fixed;
            width: 100%;
            bottom: 20px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button, a {
            color: #e0f2fe;
            font-family: "Montserrat", serif;
            font-size: 12px;
            text-decoration: none;
            background: rgba(30, 27, 75, 0.8);
            border-radius: 20px;
            border: 1px solid #60a5fa;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(59,130,246,0.5);
        }

        /* CRÉDITO EDWARD-NIGHT */
        .credit {
            position: fixed;
            bottom: 15px;
            right: 18px;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            color: #94a3b8;
            z-index: 200;
            font-family: monospace;
            letter-spacing: 0.8px;
        }
        .credit span {
            color: #60a5fa;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="canvas"></canvas>
        <div class="buttons">
            <button type="button" id="colors-btn">
                💙 Colores Aleatorios 💜
            </button>
        </div>
    </div>

    <!-- CRÉDITO -->
    <div class="credit">Hecho por <span>Edward-Night</span> ✨</div>

    <script type="module">
        import AttractionCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.26/build/cursors/attraction1.min.js";

        const app = AttractionCursor(document.getElementById('canvas'), {
            particles: {
                attractionIntensity: 0.75,
                size: 1.5,
            },
        });

        // Colores iniciales en tonos azules/morados
        const initialColors = [0x3b82f6, 0x8b5cf6, 0x60a5fa, 0xa855f7];
        app.particles.light1.color.set(initialColors[0]);
        app.particles.light2.color.set(initialColors[1]);

        const button1 = document.getElementById('colors-btn');

        button1.addEventListener('click', () => {
            // Generar colores aleatorios en tonos azules y morados
            const randomHue1 = 220 + Math.random() * 60; // 220-280 (azul a morado)
            const randomHue2 = 220 + Math.random() * 60;
            const randomSaturation = 70 + Math.random() * 30;
            const randomLightness = 50 + Math.random() * 30;
            
            app.particles.light1.color.setHSL(randomHue1 / 360, randomSaturation / 100, randomLightness / 100);
            app.particles.light2.color.setHSL(randomHue2 / 360, randomSaturation / 100, randomLightness / 100);
        });
    </script>
</body>
</html>
